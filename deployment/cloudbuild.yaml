# ═══════════════════════════════════════════════════════════════════════
# NARAD — Google Cloud Build → Cloud Run deployment pipeline
# Usage: gcloud builds submit --config cloudbuild.yaml \
#          --substitutions=_GEMINI_API_KEY="your_key_here",_GOOGLE_MAPS_API_KEY="optional_maps_key"
# ═══════════════════════════════════════════════════════════════════════
steps:
  # ── Build the container image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # ── Push to Artifact Registry ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}'

  # ── Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdk/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--port=8080'
      - '--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=${_GEMINI_MODEL},DEFAULT_CITY=${_DEFAULT_CITY},SERVE_STATIC=true,GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_API_KEY}'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'

substitutions:
  _SERVICE_NAME: narad-city-ai
  _REGION: us-central1
  _REPO: narad-repo
  _GEMINI_MODEL: gemini-2.0-flash
  _DEFAULT_CITY: Hyderabad
  _GEMINI_API_KEY: ""  # pass via --substitutions at submit time
  _GOOGLE_MAPS_API_KEY: ""  # optional — enables real live traffic data

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1200s
