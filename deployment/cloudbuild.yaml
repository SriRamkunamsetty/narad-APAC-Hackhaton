# ═══════════════════════════════════════════════════════════════════════
# NARAD — Google Cloud Build → Cloud Run deployment pipeline
#
# Secrets (Gemini key, Maps key, admin API key) are read from Secret Manager
# at deploy time via --set-secrets, NOT passed as plain substitutions here —
# substitutions can appear in Cloud Build logs/history, which is not
# appropriate for real credentials. deploy.sh creates these secrets before
# triggering this build. Usage: run deployment/deploy.sh, don't call this
# file directly unless you've already created the three secrets yourself:
#   narad-gemini-key, narad-maps-key, narad-admin-key
# ═══════════════════════════════════════════════════════════════════════
steps:
  # ── Run the test suite FIRST — a failing build here stops the deploy ────
  # entirely. Never deploy on top of a red test suite.
  - name: 'python:3.12-slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r backend/requirements.txt --quiet
        python -m pytest backend/tests/ -q

  # ── Build the container image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # ── Push to Artifact Registry ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}'

  # ── Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdk/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--port=8080'
      - '--set-env-vars=GEMINI_MODEL=${_GEMINI_MODEL},DEFAULT_CITY=${_DEFAULT_CITY},SERVE_STATIC=true,GCP_PROJECT_ID=${PROJECT_ID},BIGQUERY_DATASET=${_BIGQUERY_DATASET},ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}'
      - '--set-secrets=GEMINI_API_KEY=narad-gemini-key:latest,GOOGLE_MAPS_API_KEY=narad-maps-key:latest,NARAD_ADMIN_API_KEY=narad-admin-key:latest'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest'

substitutions:
  _SERVICE_NAME: narad-city-ai
  _REGION: us-central1
  _REPO: narad-repo
  _GEMINI_MODEL: gemini-2.0-flash
  _DEFAULT_CITY: Hyderabad
  _BIGQUERY_DATASET: narad_city_data
  # Comma-separated allowed CORS origins. "*" works for a demo but is not
  # recommended for production — update after first deploy with the real
  # Cloud Run URL (deploy.sh prints the exact command to do this).
  _ALLOWED_ORIGINS: "*"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1200s
